server.port=8090
spring.application.name=SQLNative-Hibernate

# ── H2 In-Memory Database (no install needed) ────────────────
spring.datasource.url=jdbc:h2:mem:demodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── H2 Console (browser: http://localhost:8090/h2-console) ───
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Hibernate / JPA ───────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Seed data ─────────────────────────────────────────────────
spring.sql.init.mode=always
